{% extends "polls/base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            {% comment %} <div class="text-5xl mb-3">⚡</div> {% endcomment %}
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-teal-400">Connexion</h1>
            <p class="mt-2 text-gray-500 dark:text-gray-400">Connectez-vous pour voter en temps réel</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-8">
            {% if form.errors %}
                <div class="mb-5 p-4 bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300 rounded-xl text-sm">
                    Identifiants incorrects. Veuillez réessayer.
                </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}" x-data="{ loading: false }" @submit="loading = true">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div class="space-y-5">
                    <div>
                        <label for="id_username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nom d'utilisateur</label>
                        <input type="text" name="username" id="id_username" autocomplete="username" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                    <div>
                        <label for="id_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Mot de passe</label>
                        <input type="password" name="password" id="id_password" autocomplete="current-password" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                </div>

                <button type="submit"
                        class="mt-8 w-full py-3 px-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow transition-all duration-200 flex items-center justify-center"
                        :disabled="loading">
                    <template x-if="!loading">
                        <span>Se connecter</span>
                    </template>
                    <template x-if="loading">
                        <span class="flex items-center">
                            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            Connexion...
                        </span>
                    </template>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
