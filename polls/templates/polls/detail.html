{% extends 'polls/base.html' %}

{% block content %}
<div class="card shadow mb-4 border-0">
    <div class="card-header bg-primary text-white py-3">
        <h2 class="h4 mb-0"><i class="bi bi-question-circle"></i> {{ poll.question }}</h2>
    </div>
    <div class="card-body p-4">
        {% if error_message %}
            <div class="alert alert-danger">{{ error_message }}</div>
        {% endif %}

        <form action="{% url 'polls:detail' poll.id %}" method="post">
            {% csrf_token %}
            <div class="mb-4">
                {% for choice in poll.choices.all %}
                    <div class="form-check fs-5 mb-2">
                        <input class="form-check-input" type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
                        <label class="form-check-label" for="choice{{ forloop.counter }}">
                            {{ choice.text }}
                        </label>
                    </div>
                {% endfor %}
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-4">
                <button type="submit" class="btn btn-success btn-lg px-4">Soumettre mon vote</button>
                <a href="{% url 'polls:results' poll.id %}" class="text-secondary text-decoration-none">Voir les résultats sans voter</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
