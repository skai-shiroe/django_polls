{% extends 'polls/base.html' %}

{% block content %}
<h1 class="mb-4">Sondages Actifs</h1>

{% if polls %}
    <div class="list-group shadow-sm">
    {% for poll in polls %}
        <a href="{% url 'polls:detail' poll.id %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
            <span class="fs-5">{{ poll.question }}</span>
            <span class="badge bg-primary rounded-pill px-3 py-2">Voter / Voir Résultats</span>
        </a>
    {% endfor %}
    </div>
{% else %}
    <div class="alert alert-info shadow-sm">
        Aucun sondage n'est disponible pour le moment.
    </div>
{% endif %}
{% endblock %}
